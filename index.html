<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clara - Teşekkür</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .container {
            position: relative;
            text-align: center;
            padding: 40px;
        }
        
        .avatar-wrapper {
            position: relative;
            width: 280px;
            height: 500px;
            margin: 0 auto 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 0 60px rgba(100, 200, 255, 0.3),
                0 0 100px rgba(100, 200, 255, 0.1),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
            animation: pulse-glow 3s ease-in-out infinite;
        }
        
        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center top;
            filter: brightness(1.1) contrast(1.05);
        }
        
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(100, 200, 255, 0.8) 50%, 
                transparent 100%);
            animation: scan 3s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }
        
        .glow-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 150px;
            background: radial-gradient(ellipse, 
                rgba(100, 200, 255, 0.4) 0%, 
                rgba(100, 200, 255, 0.1) 40%,
                transparent 70%);
            animation: breathe 3s ease-in-out infinite;
            pointer-events: none;
        }
        
        .text-container {
            position: relative;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            backdrop-filter: blur(10px);
            animation: fade-in-up 2s ease-out;
        }
        
        .text-container h1 {
            color: #64c8ff;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 
                0 0 10px rgba(100, 200, 255, 0.8),
                0 0 20px rgba(100, 200, 255, 0.4),
                0 0 30px rgba(100, 200, 255, 0.2);
            letter-spacing: 2px;
            animation: text-glow 2s ease-in-out infinite alternate;
        }
        
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(100, 200, 255, 0.6);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 30%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 50%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 70%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 90%; animation-delay: 4s; }
        
        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 
                    0 0 60px rgba(100, 200, 255, 0.3),
                    0 0 100px rgba(100, 200, 255, 0.1);
            }
            50% { 
                box-shadow: 
                    0 0 80px rgba(100, 200, 255, 0.5),
                    0 0 120px rgba(100, 200, 255, 0.2);
            }
        }
        
        @keyframes scan {
            0%, 100% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        
        @keyframes breathe {
            0%, 100% { 
                opacity: 0.3; 
                transform: translate(-50%, -50%) scale(1); 
            }
            50% { 
                opacity: 0.7; 
                transform: translate(-50%, -50%) scale(1.15); 
            }
        }
        
        @keyframes fade-in-up {
            0% { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        @keyframes text-glow {
            0% { 
                text-shadow: 
                    0 0 10px rgba(100, 200, 255, 0.8),
                    0 0 20px rgba(100, 200, 255, 0.4);
            }
            100% { 
                text-shadow: 
                    0 0 20px rgba(100, 200, 255, 1),
                    0 0 40px rgba(100, 200, 255, 0.6),
                    0 0 60px rgba(100, 200, 255, 0.3);
            }
        }
        
        @keyframes float {
            0%, 100% { 
                transform: translateY(100vh) scale(0); 
                opacity: 0; 
            }
            10% { 
                opacity: 1; 
            }
            90% { 
                opacity: 1; 
            }
            100% { 
                transform: translateY(-100px) scale(1); 
                opacity: 0; 
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    
    <div class="container">
        <div class="avatar-wrapper">
            <img src="avatar_clara.jpg" alt="Clara Avatar">
            <div class="scan-line"></div>
            <div class="glow-overlay"></div>
        </div>
        
        <div class="text-container">
            <h1>Teşekkür ederim Teoman!</h1>
        </div>
    </div>
</body>
</html>
